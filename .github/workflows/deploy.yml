name: Deploy to Vercel

on:
  push:
    branches:
      - main
  schedule:
    # Roda diariamente às 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and deploy
        run: |
          npm ci
          npx vercel@latest deploy --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Post to Telegram
        if: always()
        run: |
          python3 -c "
          import urllib.request, urllib.parse, json
          url = 'https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage'
          data = urllib.parse.urlencode({
              'chat_id': '-1003567265869',
              'text': '📰 <b>Novo artigo publicado no SnowBall!</b>\n\n📅 Nova publicação\n🔗 https://blog.dividai.com\n\n#SnowBall #DividAI',
              'parse_mode': 'HTML'
          }).encode('utf-8')
          try:
              urllib.request.urlopen(url, data)
              print('Telegram OK')
          except:
              print('Telegram Error')
          "
