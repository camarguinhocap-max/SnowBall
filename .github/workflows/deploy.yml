name: Deploy to Vercel

on:
  push:
    branches:
      - main
  schedule:
    # Roda diariamente às 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm ci
      
      - run: npm run build

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Post to Telegram
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="-1003567265869" \
            -d parse_mode="HTML" \
            -d text="📰 <b>Novo artigo publicado no SnowBall!</b>%0A%0A📅 Nova publicação às $(date +'%d/%m/%Y %H:%M')%0A🔗 https://blog.dividai.com%0A%0A#SnowBall #DividAI"
