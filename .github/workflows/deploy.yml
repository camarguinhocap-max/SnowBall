name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ ERRO: VERCEL_TOKEN não está configurado!"
            exit 1
          fi
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "⚠️ AVISO: TELEGRAM_BOT_TOKEN não está configurado"
          fi
          echo "✅ Secrets encontrados"

      - name: Install and test build
        run: |
          npm ci
          npm run build || true

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} || true

      - name: Post to Telegram
        if: always()
        run: |
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "Telegram não configurado, pulando..."
            exit 0
          fi
          python3 << 'EOF'
import urllib.request, urllib.parse, json
try:
    url = 'https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage'
    data = urllib.parse.urlencode({
        'chat_id': '-1003567265869',
        'text': '📰 Deployme SnowBall!',
        'parse_mode': 'HTML'
    }).encode('utf-8')
    urllib.request.urlopen(url, data, timeout=5)
    print('✅ Telegram enviado')
except Exception as e:
    print(f'⚠️ Telegram erro: {e}')
EOF
